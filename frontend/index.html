<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Browser Agent</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar: chats -->
    <aside class="sidebar">
      <button id="newChatBtn" class="new-chat">＋ New chat</button>
      <div id="threadList" class="thread-list"></div>
      <div class="brand">🤖 AI Browser Agent</div>
    </aside>

    <!-- Chat column -->
    <section class="chat">
      <header class="chat-head">
        <div id="chatTitle" class="chat-title">New chat</div>
        <span class="state-chip" id="stateChip">idle</span>
      </header>

      <div id="transcript" class="transcript">
        <div id="emptyHint" class="empty-hint">
          Ask the agent to browse, extract data to CSV/Excel, or take a screenshot.<br>
          Stay in the same chat and it remembers the context.
        </div>
      </div>

      <div class="composer">
        <div id="artifacts" class="artifacts" hidden></div>
        <div class="composer-tools">
          <input id="startUrl" class="start-url" type="text" placeholder="Start URL (optional)" />
          <select id="scrollSpeed" class="sel" title="How far the AI scrolls each step">
            <option value="slow">Scroll: Slow</option>
            <option value="medium">Scroll: Medium</option>
            <option value="fast">Scroll: Fast</option>
          </select>
          <label class="num-field" title="Fixed pixels to scroll each step — overrides the AI and the speed preset. Empty = let the AI adapt / use the preset.">
            ↕ Scroll
            <input id="scrollAmount" type="number" min="0" max="4000" step="50" placeholder="auto" />
            px
          </label>
          <label class="num-field" title="Pause after each scroll, in seconds. Empty = use the preset.">
            ⏱ Delay
            <input id="scrollDelay" type="number" min="0" max="30" step="0.5" placeholder="auto" />
            s
          </label>
          <label class="chk" title="LLM reasoning ON — smarter (understands the task, adapts) but ~3× slower per step">
            <input type="checkbox" id="smartChk" checked /> 🧠 Smart
          </label>
          <label id="visionLbl" class="chk" title="Always-on eyes — a vision model looks at the screen EVERY step so the agent sees layout, truncated text, modals and image-only pages. Most reliable, but ~2-4s slower per step. Uncheck for fast DOM-only.">
            <input type="checkbox" id="visionChk" checked /> 👁 Vision
          </label>
          <label id="unlimitedLbl" class="chk" title="No 30-step limit — runs until the AI is done or you Stop">
            <input type="checkbox" id="unlimitedChk" /> ♾️ Unlimited
          </label>
          <button id="toggleBtn" class="mini-btn" disabled>✋ Take Over</button>
          <button id="stopBtn" class="mini-btn" disabled>■ Stop</button>
        </div>
        <div class="composer-row">
          <textarea id="task" rows="1" placeholder="Message the agent…  (e.g. find the cheapest 4GB flashdisk on Tokopedia and export a CSV)"></textarea>
          <button id="startBtn" class="send" title="Send">➤</button>
        </div>
      </div>
    </section>

    <!-- Browser preview -->
    <section class="preview">
      <div class="preview-bar">
        <input id="goUrl" class="go-url" type="text" placeholder="Go to URL…  (https://…)" />
        <button id="goBtn" class="mini-btn">Go</button>
        <span id="modeBadge" class="mode-badge view">view-only</span>
        <button id="captureBtn" class="mini-btn" title="Save a screenshot of the current view">📸</button>
      </div>
      <div class="shot-wrap" id="screenWrap" tabindex="0">
        <img id="screen" alt="browser" draggable="false" />
        <div id="screenEmpty" class="shot-empty">Browser not running yet.<br>Send a message to open it here.</div>
        <div id="viewOnly" class="view-only-overlay" hidden aria-hidden="true">AI is driving — click <b>Take Over</b> to interact</div>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
